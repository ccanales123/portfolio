<!-- Open this in a browser and take a screenshot (1200x630) then save as og-image.png -->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0a0a0b;
    color: #f0f0f0;
    font-family: system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    top: -20%; right: -10%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,160,0.2) 0%, transparent 60%);
    filter: blur(60px);
  }
  .content { position: relative; text-align: center; }
  .tag { font-size: 14px; color: #00e5a0; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px; font-family: monospace; }
  h1 { font-size: 64px; font-weight: 800; margin-bottom: 12px; }
  h1 span { background: linear-gradient(135deg, #00e5a0, #00b8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: 24px; color: #9a9a9e; font-weight: 300; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="tag">Senior Full Stack Engineer</div>
    <h1>Cesar <span>Canales</span></h1>
    <p class="sub">React · TypeScript · Node.js · Java · Spring Boot</p>
  </div>
</body>
</html>
